<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attack on titan</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
  <div class="top-bar">
      <div class="logo">
    <span class="logo-icon"><img src="./src/images/logo.png" alt="logo"></span>
    <div class="logo-text">
      <p class="logo-title">TITAN ARCHIVES</p>
      <p class="logo-sub">SURVEY CORPS DATABASE</p>
    </div>
  </div>
  </div>
    <div class="container">
      <div class="links">
        <div class="top"><input id="search" type="text" placeholder="Search...">
          <button id="search-button"><img src="./src/images/search.png" alt=""></button>
          </div>
        <div class="item">
          <div class="regiment">
          <div><button  class="filter-btn" data-filter="titan">TITAN</button></div>
        <div><button  class="filter-btn" data-filter="regiment">REGIMENT</button></div>
        <div><button  class="filter-btn" data-filter="favourites">❤️ <span class="badge">0</span></button></div>
        </div>
      </div>
      <!-- items komen hier via JS -->
        <!-- <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div> -->
        <div class="last"></div>
      </div>
      <div class="rechts">
        <div class="main"> <div class="image-container"></div>
        <div class="character-img">
    <img src="./src/images/title.png" alt="characters">
  </div>
  <div class="character-info">
    <h1 class="character-name"></h1>
    <p class="character-desc"></p>
  </div>
  <div class="arrows">
    <button class="arrow left"><img src="./src/images/controlBL.png" alt="prev"></button>
    <button class="arrow right"><img src="./src/images/controlBR.png" alt="next"></button>
  </div></div>
        <div class="bottom-bar">
  <div class="blok">
    <span class="label">REGIMENT</span>
    <span class="value"></span>
  </div>
  <div class="blok">
    <span class="label">OCCUPATION</span>
    <span class="value"></span>
  </div>
  <div class="blok">
    <span class="label">GENDER</span>
    <span class="value"></span>
  </div>
  <div class="blok">
    <span class="label">ALIAS</span>
    <span class="value"></span>
  </div>
  <div class="blok">
    <span class="label">FAVORITE</span>
    <span class="value"><button class="heart"><img src="./src/images/emptyheart.png" alt=""></button></span>
  </div>

</div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
